[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# SPA catch-all — serve index.html for all non-static routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Branch deploy context — applies to all non-production branches
[context.branch-deploy]
  command = "npm run build"

# Production context (main branch)
[context.production]
  command = "npm run build"
